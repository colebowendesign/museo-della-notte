<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Museo della Notte — Where the Night Keeps Its Treasures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --midnight:#0a0e1f;
    --obsidian:#050714;
    --indigo:#141a36;
    --indigo-2:#1d2347;
    --gold:#d4af37;
    --gold-2:#c9a961;
    --gold-glow:#e7c970;
    --oxblood:#7a1818;
    --ivory:#f5ecd0;
    --ivory-dim:#cfc6ad;
    --serif:'Cormorant Garamond', 'EB Garamond', Georgia, serif;
    --sans:'Inter', system-ui, sans-serif;
    --mono:'DM Mono', ui-monospace, monospace;
    --glass-bg: rgba(245, 236, 208, 0.045);
    --glass-border: rgba(212, 175, 55, 0.22);
    --glass-blur: 18px;
  }
  *{ box-sizing:border-box; }
  html, body { margin:0; padding:0; background:var(--obsidian); color:var(--ivory); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  body{
    background:
      radial-gradient(ellipse at 20% 10%, rgba(29, 35, 71, 0.55), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(122, 24, 24, 0.18), transparent 55%),
      radial-gradient(ellipse at 50% 40%, rgba(20, 26, 54, 0.6), transparent 60%),
      var(--obsidian);
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background:rgba(212,175,55,0.35); color:var(--ivory); }

  /* constellation backdrop */
  .stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1px 1px at 12% 23%, rgba(245,236,208,0.7), transparent 50%),
      radial-gradient(1px 1px at 47% 8%, rgba(245,236,208,0.5), transparent 50%),
      radial-gradient(1.2px 1.2px at 78% 14%, rgba(245,236,208,0.85), transparent 50%),
      radial-gradient(1px 1px at 91% 36%, rgba(245,236,208,0.55), transparent 50%),
      radial-gradient(1px 1px at 22% 63%, rgba(245,236,208,0.45), transparent 50%),
      radial-gradient(1.4px 1.4px at 64% 71%, rgba(245,236,208,0.7), transparent 50%),
      radial-gradient(1px 1px at 35% 85%, rgba(245,236,208,0.4), transparent 50%),
      radial-gradient(1.2px 1.2px at 84% 92%, rgba(245,236,208,0.6), transparent 50%),
      radial-gradient(1px 1px at 5% 50%, rgba(245,236,208,0.5), transparent 50%),
      radial-gradient(1px 1px at 56% 41%, rgba(245,236,208,0.35), transparent 50%);
    opacity:var(--star-density, 0.75);
    animation: twinkle 9s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{ opacity: calc(var(--star-density,0.75) * 0.85); }
    50%   { opacity: calc(var(--star-density,0.75) * 1.0); }
  }
  /* film grain */
  .grain{
    position:fixed; inset:-50%; pointer-events:none; z-index:1;
    opacity:.06; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.6'/></svg>");
  }

  #root{ position:relative; z-index:2; }

  /* helpers */
  .serif{ font-family:var(--serif); font-weight:400; letter-spacing:-0.005em; }
  .label{ font-family:var(--sans); font-size:11px; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold-2); font-weight:500; }
  .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(245,236,208,0.55); }

  /* glass primitives */
  .glass{
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur)) saturate(140%);
    -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
    border:0.5px solid var(--glass-border);
    box-shadow:
      inset 0 1px 0 rgba(245,236,208,0.08),
      inset 0 -1px 0 rgba(0,0,0,0.3),
      0 24px 60px -20px rgba(0,0,0,0.65);
    border-radius:14px;
  }
  .glass-strong{
    background: rgba(20, 26, 54, 0.55);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border:0.5px solid rgba(212,175,55,0.32);
    box-shadow:
      inset 0 1px 0 rgba(245,236,208,0.12),
      inset 0 0 0 0.5px rgba(245,236,208,0.05),
      0 30px 80px -20px rgba(0,0,0,0.8);
    border-radius:18px;
  }

  .gold-rule{
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
    border:0;
  }

  /* glass button */
  .gbtn{
    appearance:none; cursor:pointer;
    font-family:var(--sans); font-size:12px; font-weight:500;
    letter-spacing:0.2em; text-transform:uppercase; color:var(--ivory);
    padding:14px 26px; border-radius:999px;
    background: linear-gradient(180deg, rgba(245,236,208,0.06), rgba(245,236,208,0.02));
    border:0.5px solid rgba(212,175,55,0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow:
      inset 0 1px 0 rgba(245,236,208,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.3),
      0 8px 30px -10px rgba(212,175,55,0.25);
    transition: all 0.4s cubic-bezier(.2,.8,.2,1);
    position:relative; overflow:hidden;
  }
  .gbtn::before{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background: radial-gradient(120px 60px at 50% 120%, rgba(231,201,112,0.4), transparent 70%);
    opacity:0; transition:opacity 0.4s;
  }
  .gbtn:hover{
    border-color:rgba(231,201,112,0.85);
    color:#fff;
    box-shadow:
      inset 0 1px 0 rgba(245,236,208,0.3),
      inset 0 -1px 0 rgba(0,0,0,0.3),
      0 12px 40px -8px rgba(231,201,112,0.45);
    transform: translateY(-1px);
  }
  .gbtn:hover::before{ opacity:1; }
  .gbtn-primary{
    background: linear-gradient(180deg, rgba(212,175,55,0.22), rgba(212,175,55,0.08));
    border-color: rgba(231,201,112,0.7);
    color:#fff;
  }
  .gbtn-ghost{
    border-color:rgba(245,236,208,0.18);
  }
  .gbtn-sm{ padding:10px 18px; font-size:10.5px; letter-spacing:0.22em; }

  /* moonbeam */
  .moonbeam{
    position:absolute; pointer-events:none;
    width:300px; height:140vh;
    background: linear-gradient(180deg, rgba(231,201,112,0.18), rgba(231,201,112,0.04) 40%, transparent 80%);
    transform: rotate(12deg) translateY(-10vh);
    filter: blur(40px);
    mix-blend-mode: screen;
  }

  /* fade-in on scroll */
  .reveal{ opacity:0; transform: translateY(30px); transition: opacity 1.2s ease, transform 1.2s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* cursor firefly */
  .firefly{
    position:fixed; width:14px; height:14px; border-radius:50%;
    background: radial-gradient(circle, rgba(231,201,112,0.9), rgba(212,175,55,0.4) 40%, transparent 70%);
    pointer-events:none; z-index:9999;
    mix-blend-mode: screen;
    transform: translate(-50%,-50%);
    transition: opacity 0.3s;
  }

  /* shimmer for glass cards */
  @keyframes shimmer {
    0%{ transform: translateX(-120%) skewX(-20deg); }
    100%{ transform: translateX(220%) skewX(-20deg); }
  }
  .shimmerable{ position:relative; overflow:hidden; }
  .shimmerable::after{
    content:''; position:absolute; top:0; bottom:0; width:40%;
    background: linear-gradient(90deg, transparent, rgba(245,236,208,0.08), transparent);
    transform: translateX(-120%) skewX(-20deg);
    pointer-events:none;
  }
  .shimmerable:hover::after{ animation: shimmer 1.6s ease; }

  /* placeholder image */
  .ph{
    position:relative; overflow:hidden; border-radius:inherit;
    background:
      repeating-linear-gradient(135deg,
        rgba(20,26,54,0.95) 0 14px,
        rgba(10,14,31,0.95) 14px 28px);
  }
  .ph::after{
    content: attr(data-label);
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono); font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase;
    color: rgba(245,236,208,0.45);
    text-align:center; padding:0 12px;
  }

  /* Inputs in modal */
  .field{
    width:100%;
    background: rgba(245,236,208,0.04);
    border:0.5px solid rgba(212,175,55,0.22);
    color:var(--ivory);
    font-family:var(--sans); font-size:14px;
    padding:14px 16px; border-radius:10px;
    outline:none;
    transition: all 0.3s;
  }
  .field:focus{
    border-color:rgba(231,201,112,0.7);
    background: rgba(245,236,208,0.07);
    box-shadow: 0 0 0 4px rgba(212,175,55,0.08);
  }
  .field::placeholder{ color:rgba(245,236,208,0.35); }

  /* horiz scroll */
  .hscroll{ overflow-x:auto; scrollbar-width:none; }
  .hscroll::-webkit-scrollbar{ display:none; }

  /* responsive */
  @media (max-width: 760px){
    .hide-sm{ display:none !important; }
  }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="grain"></div>
  <div id="firefly" class="firefly" style="opacity:0"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="reservation.jsx"></script>
  <script type="text/babel" src="main.jsx"></script>
</body>
</html>
