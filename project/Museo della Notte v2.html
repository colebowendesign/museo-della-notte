<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Museo della Notte — Renaissance Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#ede4cf;
    --paper-2:#e3d6b8;
    --ink:#0d0a06;
    --ink-soft:#2a2218;
    --gold:#a8762a;
    --gold-deep:#7d531a;
    --gold-bright:#c9942f;
    --oxblood:#6b1818;
    --crimson:#902020;
    --indigo:#1a1f3d;
    --serif:'Cormorant Garamond', 'EB Garamond', Georgia, serif;
    --display:'Cinzel', 'Cormorant Garamond', serif;
    --sans:'Inter', system-ui, sans-serif;
    --mono:'DM Mono', ui-monospace, monospace;
  }
  *{ box-sizing:border-box; }
  html, body { margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; }
  body{
    background:
      radial-gradient(ellipse at 80% 0%, rgba(168,118,42,0.10), transparent 55%),
      radial-gradient(ellipse at 0% 90%, rgba(107,24,24,0.08), transparent 60%),
      var(--paper);
    min-height:100vh;
    overflow-x:hidden;
  }
  ::selection{ background:rgba(168,118,42,0.4); color:var(--ink); }

  /* paper texture */
  .paper-tex{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    opacity:.18; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0 0.02 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  #root{ position:relative; z-index:2; }

  /* type */
  .display{ font-family:var(--display); font-weight:500; letter-spacing:0.01em; }
  .serif{ font-family:var(--serif); }
  .smallcaps{ font-family:var(--display); text-transform:uppercase; letter-spacing:0.18em; font-weight:500; }
  .label{ font-family:var(--mono); font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--gold-deep); font-weight:500; }
  .roman{ font-family:var(--display); letter-spacing:0.1em; font-weight:500; }

  /* solid bold buttons (no glass) */
  .btn{
    appearance:none; cursor:pointer;
    font-family:var(--display); font-size:11px; font-weight:600;
    letter-spacing:0.22em; text-transform:uppercase;
    padding:16px 28px; border-radius:0;
    transition: all 0.3s ease;
    border:1.5px solid var(--ink);
    color:var(--ink); background:transparent;
    position:relative;
  }
  .btn:hover{ background:var(--ink); color:var(--paper); }
  .btn-solid{ background:var(--ink); color:var(--paper); }
  .btn-solid:hover{ background:var(--oxblood); border-color:var(--oxblood); color:var(--paper); }
  .btn-gold{ background:var(--gold); color:var(--paper); border-color:var(--gold); }
  .btn-gold:hover{ background:var(--gold-deep); border-color:var(--gold-deep); }
  .btn-light{ border-color:var(--paper); color:var(--paper); background:transparent; }
  .btn-light:hover{ background:var(--paper); color:var(--ink); }
  .btn-sm{ padding:10px 18px; font-size:10px; }

  /* dropcap */
  .dropcap::first-letter{
    font-family:var(--display); font-weight:600;
    font-size:5.4em; line-height:0.9;
    float:left; padding:6px 12px 0 0;
    color:var(--oxblood);
  }

  /* rule lines */
  hr.line{ border:0; height:1px; background:var(--ink); opacity:0.5; margin:0; }
  hr.line-thick{ border:0; height:2px; background:var(--ink); margin:0; }
  hr.line-gold{ border:0; height:1px; background:var(--gold); margin:0; }

  /* placeholder painting style */
  .ph{
    position:relative; overflow:hidden;
    background:
      linear-gradient(135deg, rgba(13,10,6,0.85), rgba(42,34,24,0.7)),
      repeating-linear-gradient(45deg, rgba(168,118,42,0.05) 0 6px, transparent 6px 14px);
    color:rgba(237,228,207,0.6);
  }
  .ph::after{
    content: attr(data-label);
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase;
    text-align:center; padding: 0 16px;
    color: rgba(237,228,207,0.55);
  }
  .ph-frame{
    border:8px double var(--gold-deep);
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--ink);
  }

  /* reveal */
  .reveal{ opacity:0; transform: translateY(30px); transition: opacity 1s ease, transform 1s ease; }
  .reveal.in{ opacity:1; transform:none; }

  /* firefly */
  .firefly{
    position:fixed; width:14px; height:14px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,148,47,0.85), rgba(168,118,42,0.4) 40%, transparent 70%);
    pointer-events:none; z-index:9999;
    mix-blend-mode: multiply;
    transform: translate(-50%,-50%);
    transition: opacity 0.3s;
  }

  /* form */
  .field{
    width:100%;
    background:transparent;
    border:0; border-bottom:1.5px solid var(--ink);
    color:var(--ink);
    font-family:var(--serif); font-size:18px;
    padding:10px 2px; outline:none;
    transition: all 0.3s;
  }
  .field:focus{ border-color:var(--oxblood); }
  .field::placeholder{ color:rgba(13,10,6,0.4); font-style:italic; }

  .hide-sm{}
  @media (max-width: 760px){
    .hide-sm{ display:none !important; }
  }
</style>
</head>
<body>
  <div class="paper-tex"></div>
  <div id="firefly" class="firefly" style="opacity:0"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ornaments-v2.jsx"></script>
  <script type="text/babel" src="app-v2.jsx"></script>
  <script type="text/babel" src="reservation-v2.jsx"></script>
  <script type="text/babel" src="main-v2.jsx"></script>
</body>
</html>
